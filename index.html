<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGEN MRP Label Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #e8e8e8;
            padding: 20px;
        }

        .no-print {
            max-width: 700px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .no-print h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
            font-size: 22px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 12px;
            color: #444;
        }

        .form-group input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .logo-upload-section {
            margin-bottom: 15px;
            padding: 12px;
            border: 2px dashed #007bff;
            border-radius: 8px;
            text-align: center;
            background: #f8f9ff;
        }

        .logo-upload-section label {
            font-weight: 700;
            font-size: 13px;
            color: #333;
            cursor: pointer;
        }

        .logo-upload-section input[type="file"] {
            margin-top: 8px;
        }

        .logo-preview {
            margin-top: 8px;
        }

        .logo-preview img {
            max-height: 40px;
            border: 1px solid #ddd;
            padding: 4px;
            background: #fff;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-generate {
            background: #007bff;
            color: #fff;
        }

        .btn-generate:hover {
            background: #0056b3;
        }

        .btn-print {
            background: #28a745;
            color: #fff;
        }

        .btn-print:hover {
            background: #1e7e34;
        }

        /* A4 Page with Label Grid */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            margin: 20px auto;
            padding: 3mm;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            display: none;
        }

        .label-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 0mm;
            width: 100%;
            height: 291mm;
        }

        .label-card {
            border: 1.5px solid #000;
            padding: 1.5mm;
            font-size: 7px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            gap: 1px;
            overflow: hidden;
        }

        /* Logo at top - chipka hua, no padding */
        .label-card .logo-container {
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .label-card .logo-container img {
            height: 12px;
            width: auto;
            display: block;
            margin: 0 auto;
        }

        .label-card .logo-container .logo-fallback {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #000;
        }

        /* Brand Name - product ke upar */
        .label-card .brand-line {
            font-size: 7px;
            text-align: left;
            margin: 1px 0;
            color: #000;
            font-weight: 700;
        }

        /* Product table */
        .label-card .product-table {
            width: 100%;
            margin: 0;
            border-collapse: collapse;
        }

        .label-card .product-table td {
            font-size: 7px;
            vertical-align: top;
            padding: 0;
        }

        .label-card .product-table .td-key {
            font-weight: 700;
            white-space: nowrap;
            width: 40%;
            color: #000;
        }

        .label-card .product-table .td-value {
            font-weight: 400;
            color: #000;
            width: 60%;
        }

        /* MRP - bold */
        .label-card .mrp-line {
            font-size: 8px;
            font-weight: 900;
            text-align: center;
            padding: 2px 0;
            margin: 2px 0;
            border: 1.5px solid #000;
        }

        /* Company info - left aligned chipka */
        .label-card .company-info {
            font-size: 6px;
            line-height: 1.3;
            color: #000;
            margin: 1px 0;
            text-align: left;
        }

        /* Package Contents - left aligned chipka */
        .label-card .package-line {
            font-size: 6.5px;
            font-weight: 700;
            margin: 0;
            text-align: left;
        }

        /* Print Styles */
        @media print {
            body {
                background: #fff;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            .a4-page {
                display: block !important;
                width: 210mm;
                height: 297mm;
                padding: 3mm;
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }

            .label-grid {
                height: 291mm;
            }
        }
    </style>
</head>
<body>

    <!-- Input Form -->
    <div class="no-print">
        <h1>UNIGEN - MRP Sticker Label Generator</h1>

        <!-- Logo Upload Section -->
        <div class="logo-upload-section">
            <label for="logoUpload">Upload UNIGEN Logo (Optional):</label><br>
            <input type="file" id="logoUpload" accept="image/*" onchange="previewLogo(this)">
            <div class="logo-preview" id="logoPreview"></div>
            <p style="font-size:11px; color:#666; margin-top:5px;">Agar logo upload nahi karoge toh "UNIGEN" text dikhega</p>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="e.g. Microfiber Cloth Duster 40*40CM (Pack Of 3)" value="Microfiber Cloth Duster 40*40CM (Pack Of 3)">
            </div>
            <div class="form-group">
                <label>MRP (₹)</label>
                <input type="text" id="productMRP" placeholder="e.g. 999" value="999">
            </div>
            <div class="form-group">
                <label>Net Qty</label>
                <input type="text" id="netQty" placeholder="e.g. 3 Pcs" value="3 Pcs">
            </div>
            <div class="form-group">
                <label>Package Contents</label>
                <input type="text" id="packageContents" placeholder="e.g. Duster Pack of 3" value="Duster Pack of 3">
            </div>
        </div>
        <button class="btn btn-generate" onclick="generateLabels()">Generate 35 Labels (A4 Sheet)</button>
        <button class="btn btn-print" onclick="window.print()">Print A4 Sheet</button>
    </div>

    <!-- A4 Label Sheet -->
    <div class="a4-page" id="a4Page">
        <div class="label-grid" id="labelGrid">
        </div>
    </div>

    <script>
        let uploadedLogoSrc = '';

        function previewLogo(input) {
            const preview = document.getElementById('logoPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    uploadedLogoSrc = e.target.result;
                    preview.innerHTML = '<img src="' + uploadedLogoSrc + '" alt="Logo Preview">';
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function generateLabels() {
            const productName = document.getElementById('productName').value || 'Microfiber Cloth Duster 40*40CM (Pack Of 3)';
            const productMRP = document.getElementById('productMRP').value || '999';
            const netQty = document.getElementById('netQty').value || '3 Pcs';
            const packageContents = document.getElementById('packageContents').value || 'Duster Pack of 3';

            let logoHTML = '';
            if (uploadedLogoSrc) {
                logoHTML = '<img src="' + uploadedLogoSrc + '" alt="UNIGEN">';
            } else {
                logoHTML = '<span class="logo-fallback">UNIGEN</span>';
            }

            const grid = document.getElementById('labelGrid');
            grid.innerHTML = '';

            for (let i = 0; i < 35; i++) {
                const label = document.createElement('div');
                label.className = 'label-card';
                label.innerHTML = `
                    <div class="logo-container">${logoHTML}</div>
                    <div class="brand-line">Brand Name: UNIGEN</div>
                    <table class="product-table">
                        <tr>
                            <td class="td-key">Product Name:</td>
                            <td class="td-value">${productName}</td>
                        </tr>
                        <tr>
                            <td class="td-key">Net Qty:</td>
                            <td class="td-value">${netQty}</td>
                        </tr>
                    </table>
                    <div class="mrp-line">M.R.P: &#8377;${productMRP}/- (Inclusive all taxes)</div>
                    <div class="company-info">Genuine Innovations Private Limited<br>WWW.UNIGENLIFESTYLE.COM<br>support@unigenlifestyle.com</div>
                    <div class="package-line">Package Contents:<br>${packageContents}</div>
                `;
                grid.appendChild(label);
            }

            document.getElementById('a4Page').style.display = 'block';
            document.getElementById('a4Page').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = function() {
            generateLabels();
        };
    </script>
</body>
</html>
