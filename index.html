<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGEN MRP Label Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #e8e8e8;
            padding: 20px;
        }

        .no-print {
            max-width: 700px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .no-print h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
            font-size: 22px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 12px;
            color: #444;
        }

        .form-group input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-generate {
            background: #007bff;
            color: #fff;
        }

        .btn-generate:hover {
            background: #0056b3;
        }

        .btn-print {
            background: #28a745;
            color: #fff;
        }

        .btn-print:hover {
            background: #1e7e34;
        }

        /* A4 Page with Label Grid */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            margin: 20px auto;
            padding: 5mm;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            display: none;
        }

        .label-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 2mm;
            width: 100%;
            height: 287mm;
        }

        .label-card {
            border: 1.5px solid #000;
            padding: 2.5mm;
            font-size: 6.5px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        /* UNIGEN Logo Header */
        .label-card .logo-container {
            text-align: center;
            margin-bottom: 2px;
            padding-bottom: 2px;
            border-bottom: 1px solid #000;
        }

        .label-card .logo-container .logo-text {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 2px;
            color: #000;
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }

        .label-card .logo-container .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px;
            height: 14px;
            border: 2px solid #000;
            border-radius: 50%;
            font-size: 8px;
            font-weight: 900;
            font-family: Arial, sans-serif;
        }

        .label-card .brand-line {
            font-size: 6.5px;
            text-align: center;
            margin-bottom: 2px;
            color: #000;
        }

        .label-card .product-row {
            font-size: 6.5px;
            margin: 1px 0;
            display: flex;
            flex-wrap: wrap;
        }

        .label-card .product-row .key {
            font-weight: 700;
            white-space: nowrap;
            margin-right: 4px;
        }

        .label-card .product-row .value {
            font-weight: 400;
        }

        .label-card .label-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5px 0;
            font-size: 6.5px;
        }

        .label-card .label-key {
            font-weight: 700;
            color: #000;
        }

        .label-card .label-value {
            text-align: right;
            color: #000;
        }

        .label-card .mrp-line {
            font-size: 8px;
            font-weight: 900;
            text-align: center;
            padding: 2px 0;
            margin: 2px 0;
            border: 1px solid #000;
        }

        .label-card .company-info {
            font-size: 5.5px;
            line-height: 1.4;
            color: #000;
            margin-top: 2px;
            text-align: center;
        }

        .label-card .package-line {
            font-size: 6px;
            font-weight: 700;
            margin-top: 2px;
            text-align: center;
        }

        /* Print Styles */
        @media print {
            body {
                background: #fff;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            .a4-page {
                display: block !important;
                width: 210mm;
                height: 297mm;
                padding: 5mm;
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }

            .label-grid {
                height: 287mm;
            }
        }
    </style>
</head>
<body>

    <!-- Input Form -->
    <div class="no-print">
        <h1>UNIGEN - MRP Sticker Label Generator</h1>
        <div class="form-grid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="e.g. Microfiber Cloth Duster 40*40CM (Pack Of 3)" value="Microfiber Cloth Duster 40*40CM (Pack Of 3)">
            </div>
            <div class="form-group">
                <label>MRP (₹)</label>
                <input type="text" id="productMRP" placeholder="e.g. 999" value="999">
            </div>
            <div class="form-group">
                <label>Net Qty</label>
                <input type="text" id="netQty" placeholder="e.g. 3 Pcs" value="3 Pcs">
            </div>
            <div class="form-group">
                <label>Package Contents</label>
                <input type="text" id="packageContents" placeholder="e.g. Duster Pack of 3" value="Duster Pack of 3">
            </div>
        </div>
        <button class="btn btn-generate" onclick="generateLabels()">Generate 35 Labels (A4 Sheet)</button>
        <button class="btn btn-print" onclick="window.print()">Print A4 Sheet</button>
    </div>

    <!-- A4 Label Sheet -->
    <div class="a4-page" id="a4Page">
        <div class="label-grid" id="labelGrid">
        </div>
    </div>

    <script>
        function generateLabels() {
            const productName = document.getElementById('productName').value || 'Microfiber Cloth Duster 40*40CM (Pack Of 3)';
            const productMRP = document.getElementById('productMRP').value || '999';
            const netQty = document.getElementById('netQty').value || '3 Pcs';
            const packageContents = document.getElementById('packageContents').value || 'Duster Pack of 3';

            const grid = document.getElementById('labelGrid');
            grid.innerHTML = '';

            // Generate 35 labels (5 columns x 7 rows)
            for (let i = 0; i < 35; i++) {
                const label = document.createElement('div');
                label.className = 'label-card';
                label.innerHTML = `
                    <div class="logo-container">
                        <span class="logo-text"><span class="logo-icon">U</span>UNIGEN</span>
                    </div>
                    <div class="brand-line">Brand Name: UNIGEN</div>
                    <div class="product-row">
                        <span class="key">Product Name:</span>
                        <span class="value">${productName}</span>
                    </div>
                    <div class="label-row">
                        <span class="label-key">Net Qty:</span>
                        <span class="label-value">${netQty}</span>
                    </div>
                    <div class="mrp-line">M.R.P: &#8377;${productMRP}/- (Inclusive all taxes)</div>
                    <div class="company-info">
                        Genuine Innovations Private Limited<br>
                        WWW.UNIGENLIFESTYLE.COM<br>
                        support@unigenlifestyle.com
                    </div>
                    <div class="package-line">Package Contents:<br>${packageContents}</div>
                `;
                grid.appendChild(label);
            }

            document.getElementById('a4Page').style.display = 'block';
            document.getElementById('a4Page').scrollIntoView({ behavior: 'smooth' });
        }

        // Auto-generate on page load
        window.onload = function() {
            generateLabels();
        };
    </script>
</body>
</html>
