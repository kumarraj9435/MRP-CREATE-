<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGEN MRP Label Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .no-print {
            max-width: 700px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .no-print h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
            font-size: 22px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 12px;
            color: #444;
        }

        .form-group input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .logo-upload-section {
            margin-bottom: 15px;
            padding: 12px;
            border: 2px dashed #007bff;
            border-radius: 8px;
            text-align: center;
            background: #f8f9ff;
        }

        .logo-upload-section input[type="file"] {
            margin-top: 8px;
        }

        .logo-preview {
            margin-top: 8px;
        }

        .logo-preview img {
            max-height: 40px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-generate { background: #007bff; color: #fff; }
        .btn-generate:hover { background: #0056b3; }
        .btn-print { background: #28a745; color: #fff; }
        .btn-print:hover { background: #1e7e34; }

        /* ===== A4 PAGE ===== */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            margin: 20px auto;
            padding: 10mm 8mm;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            display: none;
        }

        .label-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3mm;
            width: 100%;
        }

        /* ===== EACH LABEL ===== */
        .label-card {
            border: 2px solid #000;
            padding: 3mm;
            font-family: Arial, sans-serif;
            font-size: 8px;
            line-height: 1.5;
            page-break-inside: avoid;
        }

        .label-card .lbl-logo {
            text-align: center;
            padding-bottom: 3px;
            margin-bottom: 3px;
        }

        .label-card .lbl-logo img {
            height: 16px;
            width: auto;
        }

        .label-card .lbl-logo .logo-text {
            font-family: 'Arial Black', Arial, sans-serif;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #000;
        }

        .label-card .lbl-brand {
            text-align: center;
            font-size: 8px;
            margin-bottom: 4px;
        }

        .label-card .lbl-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 4px;
        }

        .label-card .lbl-table td {
            font-size: 8px;
            padding: 1px 0;
            vertical-align: top;
        }

        .label-card .lbl-table .lbl-key {
            font-weight: 700;
            width: 45%;
        }

        .label-card .lbl-table .lbl-val {
            width: 55%;
        }

        .label-card .lbl-mrp {
            font-size: 9px;
            font-weight: 900;
            text-align: center;
            border: 2px solid #000;
            padding: 3px 2px;
            margin: 4px 0;
        }

        .label-card .lbl-company {
            font-size: 7px;
            text-align: center;
            line-height: 1.4;
            margin: 3px 0;
        }

        .label-card .lbl-package {
            font-size: 8px;
            font-weight: 700;
            text-align: center;
            margin-top: 3px;
        }

        /* ===== PRINT ===== */
        @media print {
            body { background: #fff; padding: 0; margin: 0; }
            .no-print { display: none !important; }
            .a4-page {
                display: block !important;
                width: 210mm;
                min-height: 297mm;
                padding: 10mm 8mm;
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h1>UNIGEN - MRP Sticker Label Generator</h1>

    <div class="logo-upload-section">
        <label><b>Upload UNIGEN Logo (Optional):</b></label><br>
        <input type="file" id="logoUpload" accept="image/*" onchange="previewLogo(this)">
        <div class="logo-preview" id="logoPreview"></div>
        <p style="font-size:11px;color:#666;margin-top:5px;">Logo upload nahi karoge toh "UNIGEN" text dikhega</p>
    </div>

    <div class="form-grid">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" value="Microfiber Cloth Duster 40*40CM (Pack Of 3)">
        </div>
        <div class="form-group">
            <label>MRP (₹)</label>
            <input type="text" id="productMRP" value="999">
        </div>
        <div class="form-group">
            <label>Net Qty</label>
            <input type="text" id="netQty" value="3 Pcs">
        </div>
        <div class="form-group">
            <label>Package Contents</label>
            <input type="text" id="packageContents" value="Duster Pack of 3">
        </div>
    </div>

    <button class="btn btn-generate" onclick="generateLabels()">Generate Labels (A4 Sheet)</button>
    <button class="btn btn-print" onclick="window.print()">Print A4 Sheet</button>
</div>

<div class="a4-page" id="a4Page">
    <div class="label-grid" id="labelGrid"></div>
</div>

<script>
    let uploadedLogoSrc = '';

    function previewLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                uploadedLogoSrc = e.target.result;
                document.getElementById('logoPreview').innerHTML = '<img src="' + uploadedLogoSrc + '">';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function generateLabels() {
        const productName = document.getElementById('productName').value || 'Microfiber Cloth Duster 40*40CM (Pack Of 3)';
        const productMRP = document.getElementById('productMRP').value || '999';
        const netQty = document.getElementById('netQty').value || '3 Pcs';
        const packageContents = document.getElementById('packageContents').value || 'Duster Pack of 3';

        let logoHTML = uploadedLogoSrc
            ? '<img src="' + uploadedLogoSrc + '">'
            : '<span class="logo-text">UNIGEN</span>';

        const grid = document.getElementById('labelGrid');
        grid.innerHTML = '';

        for (let i = 0; i < 35; i++) {
            const label = document.createElement('div');
            label.className = 'label-card';
            label.innerHTML =
                '<div class="lbl-logo">' + logoHTML + '</div>' +
                '<div class="lbl-brand">Brand Name: UNIGEN</div>' +
                '<table class="lbl-table">' +
                    '<tr><td class="lbl-key">Product Name:</td><td class="lbl-val">' + productName + '</td></tr>' +
                    '<tr><td class="lbl-key">Net Qty:</td><td class="lbl-val">' + netQty + '</td></tr>' +
                '</table>' +
                '<div class="lbl-mrp">M.R.P: \u20B9' + productMRP + '/- (Inclusive all taxes)</div>' +
                '<div class="lbl-company">Genuine Innovations Private Limited<br>WWW.UNIGENLIFESTYLE.COM<br>support@unigenlifestyle.com</div>' +
                '<div class="lbl-package">Package Contents:<br>' + packageContents + '</div>';
            grid.appendChild(label);
        }

        document.getElementById('a4Page').style.display = 'block';
        document.getElementById('a4Page').scrollIntoView({ behavior: 'smooth' });
    }

    window.onload = function() { generateLabels(); };
</script>

</body>
</html>
