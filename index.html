<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIGEN MRP Label Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #e8e8e8;
            padding: 20px;
        }

        .no-print {
            max-width: 700px;
            margin: 0 auto 30px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .no-print h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #222;
            font-size: 22px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 12px;
            color: #444;
        }

        .form-group input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 13px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #007bff;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.3s;
        }

        .btn-generate {
            background: #007bff;
            color: #fff;
        }

        .btn-generate:hover {
            background: #0056b3;
        }

        .btn-print {
            background: #28a745;
            color: #fff;
        }

        .btn-print:hover {
            background: #1e7e34;
        }

        /* A4 Page with Label Grid */
        .a4-page {
            width: 210mm;
            min-height: 297mm;
            background: #fff;
            margin: 20px auto;
            padding: 5mm;
            box-shadow: 0 2px 20px rgba(0,0,0,0.2);
            display: none;
        }

        .label-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 2mm;
            width: 100%;
            height: 287mm;
        }

        .label-card {
            border: 1.5px solid #000;
            padding: 2.5mm;
            font-size: 6.5px;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: hidden;
        }

        /* UNIGEN Logo - SVG style matching the actual logo image */
        .label-card .logo-container {
            text-align: center;
            margin-bottom: 2px;
            padding-bottom: 2px;
        }

        .label-card .logo-container svg {
            height: 13px;
            width: auto;
        }

        .label-card .brand-line {
            font-size: 6px;
            text-align: center;
            margin-bottom: 2px;
            color: #000;
        }

        .label-card .product-section {
            margin: 1px 0;
        }

        .label-card .product-label {
            font-size: 6px;
            font-weight: 700;
            color: #000;
            display: flex;
            gap: 3px;
        }

        .label-card .product-label .key {
            white-space: nowrap;
        }

        .label-card .product-label .value {
            font-weight: 700;
        }

        .label-card .product-name {
            font-size: 7px;
            font-weight: 900;
            color: #000;
            margin-top: 0px;
        }

        .label-card .label-row {
            display: flex;
            justify-content: space-between;
            padding: 0.3px 0;
            font-size: 6px;
        }

        .label-card .label-key {
            font-weight: 700;
            color: #000;
        }

        .label-card .label-value {
            text-align: right;
            color: #000;
        }

        .label-card .mrp-line {
            font-size: 7.5px;
            font-weight: 900;
            text-align: left;
            padding: 2px 0;
            margin: 1.5px 0;
        }

        .label-card .company-info {
            font-size: 5.5px;
            line-height: 1.3;
            color: #000;
            margin-top: 1px;
        }

        .label-card .package-line {
            font-size: 6px;
            font-weight: 700;
            margin-top: 2px;
            border-top: 0.5px solid #000;
            padding-top: 1.5px;
        }

        /* Print Styles */
        @media print {
            body {
                background: #fff;
                padding: 0;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            .a4-page {
                display: block !important;
                width: 210mm;
                height: 297mm;
                padding: 5mm;
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }

            .label-grid {
                height: 287mm;
            }
        }
    </style>
</head>
<body>

    <!-- Input Form -->
    <div class="no-print">
        <h1>⚡ UNIGEN - MRP Sticker Label Generator</h1>
        <div class="form-grid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="e.g. C TO AUX OTG ADAPTER" value="C TO AUX OTG ADAPTER">
            </div>
            <div class="form-group">
                <label>MRP (₹)</label>
                <input type="text" id="productMRP" placeholder="e.g. 999" value="999">
            </div>
            <div class="form-group">
                <label>Net Qty</label>
                <input type="text" id="netQty" placeholder="e.g. 1 Pcs" value="1 Pcs">
            </div>
            <div class="form-group">
                <label>Package Contents</label>
                <input type="text" id="packageContents" placeholder="e.g. 1x OTG" value="1x OTG">
            </div>
        </div>
        <button class="btn btn-generate" onclick="generateLabels()">Generate 35 Labels (A4 Sheet)</button>
        <button class="btn btn-print" onclick="window.print()">🖨️ Print A4 Sheet</button>
    </div>

    <!-- A4 Label Sheet -->
    <div class="a4-page" id="a4Page">
        <div class="label-grid" id="labelGrid">
        </div>
    </div>

    <script>
        // SVG Logo matching the UNIGEN brand logo (circle with UG + UNIGEN text)
        const unigenLogoSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 30" height="13">
            <g fill="#000">
                <!-- Circle logo icon -->
                <circle cx="15" cy="15" r="13" fill="none" stroke="#000" stroke-width="2.5"/>
                <!-- U letter inside circle -->
                <path d="M8 8v8c0 4 3 6.5 7 6.5s7-2.5 7-6.5V8h-3v8c0 2.2-1.8 3.5-4 3.5S11 18.2 11 16V8H8z"/>
                <!-- G overlay -->
                <path d="M16 13h5v6c-1.5 1.5-3.5 2.5-6 2.5-4.5 0-7-3-7-6.5s2.5-6.5 7-6.5c2.5 0 4.5 1 5.5 2.5l-2 1.5c-0.8-1-2-1.7-3.5-1.7-2.8 0-4.5 2-4.5 4.2s1.7 4.2 4.5 4.2c1.5 0 2.5-0.5 3.5-1.2V15h-3v-2z" transform="translate(0,0) scale(0.45)" opacity="0"/>
                <!-- UNIGEN text -->
                <text x="34" y="20" font-family="Arial Black, Arial" font-size="18" font-weight="900" letter-spacing="1.5">UNIGEN</text>
            </g>
        </svg>`;

        function generateLabels() {
            const productName = document.getElementById('productName').value || 'C TO AUX OTG ADAPTER';
            const productMRP = document.getElementById('productMRP').value || '999';
            const netQty = document.getElementById('netQty').value || '1 Pcs';
            const packageContents = document.getElementById('packageContents').value || '1x OTG';

            const grid = document.getElementById('labelGrid');
            grid.innerHTML = '';

            // Generate 35 labels (5 columns x 7 rows)
            for (let i = 0; i < 35; i++) {
                const label = document.createElement('div');
                label.className = 'label-card';
                label.innerHTML = `
                    <div class="logo-container">
                        ${unigenLogoSVG}
                    </div>
                    <div class="brand-line">Brand Name: UNIGEN</div>
                    <div class="product-section">
                        <div class="product-label"><span class="key">Product Name:</span></div>
                        <div class="product-name">${productName}</div>
                    </div>
                    <div class="label-row">
                        <span class="label-key">Net Qty:</span>
                        <span class="label-value">${netQty}</span>
                    </div>
                    <div class="mrp-line">M.R.P: ₹${productMRP}/- (Inclusive all taxes)</div>
                    <div class="company-info">
                        Genuine Innovations Private Limited<br>
                        WWW.UNIGENLIFESTYLE.COM<br>
                        support@unigenlifestyle.com
                    </div>
                    <div class="package-line">Package Contents:<br>${packageContents}</div>
                `;
                grid.appendChild(label);
            }

            document.getElementById('a4Page').style.display = 'block';
            document.getElementById('a4Page').scrollIntoView({ behavior: 'smooth' });
        }

        // Auto-generate on page load
        window.onload = function() {
            generateLabels();
        };
    </script>
</body>
</html>
